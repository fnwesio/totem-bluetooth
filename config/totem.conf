# --- POWER & SIGNAL ---
# Keep transmit power at +8 to ensure the Right half doesn't have to 
# "scream" to reach the Left half through your hands/desk.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- INTERFERENCE DEFEAT ---
# Tighten the heartbeat. Shorter intervals (7.5ms to 15ms) make the 
# connection more resilient to 2.4GHz noise in your room.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# --- SLEEP & TIMEOUTS ---
# Enable deep sleep to protect your battery overnight.
CONFIG_ZMK_SLEEP=y
# 2-hour Deep Sleep timeout (7,200,000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000
# 15-minute Idle timeout (Dims LEDs/displays if you have them)
CONFIG_ZMK_IDLE_TIMEOUT=900000

# --- BATTERY REPORTING ---
# This fixes your missing Right-side battery percentage.
# The Left (Central) will now fetch and report the Right's data to Linux.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- STABILITY ---
# Better compatibility with the Linux BlueZ stack.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Reduces processing overhead on the XIAO's small CPU.
CONFIG_ZMK_USB_LOGGING=n
