# --- POWER & SLEEP ---
# 2-hour Deep Sleep (7,200,000 ms)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# Lower TX power to +0 to prevent voltage sags during typing
CONFIG_BT_CTLR_TX_PWR_PLUS_0=y

# --- DISABLE EXTRAS (No RGB/Underglow) ---
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n
CONFIG_ZMK_USB_LOGGING=n

# --- STABILITY ---
# Better compatibility with Linux BlueZ
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=5000

# Removed Battery Proxy/Fetching to stop the "Right half" from 
# causing the Left half to hang during typing.
