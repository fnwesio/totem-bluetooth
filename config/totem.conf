# --- POWER & SIGNAL ---
# Maximize transmit power (already using +8, keep it)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- INTERFERENCE DEFEAT ---
# Force a faster "heartbeat" between halves and laptop. 
# Shorter intervals mean less chance for a packet to be lost in the noise.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# --- SLEEP & TIMEOUTS ---
# Disable deep sleep for now to rule out "wake-up" hangs
CONFIG_ZMK_SLEEP=n
# If you re-enable sleep later, use a long timeout (30 mins)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- STABILITY & COMPATIBILITY ---
# Disable experimental features that can cause crashes on split halves
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_STUDIO_LOCKING=n

# Improve Windows/Linux host compatibility
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# --- LOGGING (For Debugging) ---
# Disable USB logging to save processing cycles on the XIAO
CONFIG_ZMK_USB_LOGGING=n
