# --- BASIC IDENTIFICATION ---
CONFIG_ZMK_KEYBOARD_NAME="Totem"

# --- POWER STABILITY (Fixes mid-typing crashes) ---
# Lowering power slightly prevents voltage "sags" that causes resets
CONFIG_BT_CTLR_TX_PWR_PLUS_0=y

# --- CONNECTIVITY (Hardened for Linux) ---
# This makes the Bluetooth stack wait longer before giving up
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=5000
# Experimental features often solve "Protocol Error" disconnects on Linux
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- BATTERY & SLEEP ---
CONFIG_ZMK_SLEEP=y
# Set to 30 mins (1,800,000 ms). 2 hours was too long for a tiny battery.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- DISABLE EVERYTHING ELSE ---
# No RGB = No extra current draw
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n
# Disable logging to save CPU cycles on the XIAO
CONFIG_ZMK_USB_LOGGING=n
